<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化馆后台管理（本地安全版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f5f0e8; font-family: "Microsoft YaHei", sans-serif; }
    .card { background: rgba(255,252,245,0.9); border: 1px solid #d4c5a9; border-radius: 1.2rem; }
    .btn-primary { background: #8b4513; color: white; border-radius: 0.8rem; font-weight: bold; }
  </style>
</head>
<body class="p-6">
  <!-- 管理员登录 -->
  <div id="adminLogin" class="max-w-md mx-auto card p-8 mt-20">
    <h2 class="text-2xl font-bold mb-4">🔐 管理员登录</h2>
    <input type="tel" id="adminPhoneInput" class="w-full text-lg p-4 border rounded-xl mb-4" placeholder="管理员手机号">
    <button id="adminLoginBtn" class="w-full btn-primary text-xl py-4 rounded-xl">登录</button>
    <p id="loginError" class="text-red-500 mt-3 hidden"></p>
  </div>

  <!-- 管理界面（登录后显示） -->
  <div id="adminPanel" class="hidden">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">📊 管理后台（安全模式）</h1>
      <button id="logoutAdminBtn" class="text-red-500 underline">退出</button>
    </div>

    <!-- 注册用户 -->
    <div class="card p-6 mb-8">
      <h2 class="text-2xl font-bold mb-4">➕ 注册新用户</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="regName" class="text-lg p-3 border rounded-xl" placeholder="姓名 *">
        <input type="tel" id="regPhone" class="text-lg p-3 border rounded-xl" placeholder="手机号 *">
        <input type="text" id="regTeam" class="text-lg p-3 border rounded-xl" placeholder="队伍名称">
        <input type="text" id="regHobby" class="text-lg p-3 border rounded-xl" placeholder="爱好">
      </div>
      <button id="registerUserBtn" class="mt-4 bg-green-700 text-white text-lg font-bold py-3 px-6 rounded-xl">注册</button>
    </div>

    <!-- 预约管理 -->
    <div class="card p-6 mb-8">
      <div class="flex flex-wrap gap-4 mb-4">
        <div><label class="block text-sm mb-1">开始日期</label><input type="date" id="adminStartDate" class="text-lg p-3 border rounded-xl"></div>
        <div><label class="block text-sm mb-1">结束日期</label><input type="date" id="adminEndDate" class="text-lg p-3 border rounded-xl"></div>
        <div><label class="block text-sm mb-1">教室</label><select id="adminRoomFilter" class="text-lg p-3 border rounded-xl"><option value="">全部教室</option></select></div>
        <button id="adminFilterBtn" class="btn-primary px-6 py-3 text-lg">查询</button>
        <button id="exportCsv" class="bg-blue-700 text-white text-lg font-bold px-6 py-3 rounded-xl">导出CSV</button>
      </div>
    </div>

    <div class="card overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-gray-100">
          <tr><th class="p-3">姓名/手机</th><th class="p-3">教室</th><th class="p-3">课程</th><th class="p-3">老师</th><th class="p-3">日期</th><th class="p-3">时段</th><th class="p-3">人数</th><th class="p-3">状态</th><th class="p-3">操作</th></tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://aermnnksvhezfykxefla.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_l9yA9MKkAqT_4gIrgoCriA_kCDlLrIR';

    // 普通 anon 客户端（权限由 RLS 控制）
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let adminPhone = null;

    // ---------- 管理员登录 ----------
    document.getElementById('adminLoginBtn').addEventListener('click', async () => {
      const phone = document.getElementById('adminPhoneInput').value.trim();
      if (!phone) return;
      const { data, error } = await supabase
        .from('profiles')
        .select('phone, is_admin')
        .eq('phone', phone)
        .eq('is_admin', true)
        .maybeSingle();
      
      if (error || !data) {
        document.getElementById('loginError').textContent = '手机号无管理员权限或未注册';
        document.getElementById('loginError').classList.remove('hidden');
        return;
      }
      adminPhone = data.phone;
      sessionStorage.setItem('adminPhone', adminPhone);
      showAdminPanel();
    });

    // 检查是否已登录
    const savedAdmin = sessionStorage.getItem('adminPhone');
    if (savedAdmin) {
      adminPhone = savedAdmin;
      showAdminPanel();
    }

    function showAdminPanel() {
      document.getElementById('adminLogin').classList.add('hidden');
      document.getElementById('adminPanel').classList.remove('hidden');
      loadRooms();
      fetchAdminBookings();
    }

    document.getElementById('logoutAdminBtn').addEventListener('click', () => {
      sessionStorage.removeItem('adminPhone');
      location.reload();
    });

    // 加载教室筛选
    async function loadRooms() {
      const { data } = await supabase.from('rooms').select('*');
      const filter = document.getElementById('adminRoomFilter');
      filter.innerHTML = '<option value="">全部教室</option>' + data.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    }

    // 查询预约
    async function fetchAdminBookings() {
      const start = document.getElementById('adminStartDate').value;
      const end = document.getElementById('adminEndDate').value;
      const roomId = document.getElementById('adminRoomFilter').value;

      let query = supabase.from('bookings').select('*, rooms(name)').order('booking_date', { ascending: false });
      if (start) query = query.gte('booking_date', start);
      if (end) query = query.lte('booking_date', end);
      if (roomId) query = query.eq('room_id', roomId);

      const { data } = await query;
      const tbody = document.getElementById('adminTableBody');
      tbody.innerHTML = data.map(b => {
        const [course, teacher] = (b.teacher_choice || '|').split('|');
        return `
          <tr class="border-b">
            <td class="p-3">${b.user_id}</td>
            <td class="p-3">${b.rooms.name}</td>
            <td class="p-3">${course || '-'}</td>
            <td class="p-3">${teacher || '-'}</td>
            <td class="p-3">${b.booking_date}</td>
            <td class="p-3">${b.time_slot}</td>
            <td class="p-3">${b.participants}</td>
            <td class="p-3">${b.status}</td>
            <td class="p-3">
              <button onclick="adminCancelBooking(${b.id})" class="text-red-500 underline mr-2">取消</button>
              <button onclick="adminDeleteBooking(${b.id})" class="text-red-700 underline">删除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // 查询按钮
    document.getElementById('adminFilterBtn').addEventListener('click', fetchAdminBookings);

    // 取消/删除（RLS 策略通过管理员 is_admin 允许）
    window.adminCancelBooking = async (id) => {
      if (!confirm('确认取消？')) return;
      // 使用 RLS 策略，自动判断管理员权限
      const { error } = await supabase.from('bookings').update({ status: 'cancelled' }).eq('id', id);
      if (error) alert('操作失败：' + error.message);
      else fetchAdminBookings();
    };
    window.adminDeleteBooking = async (id) => {
      if (!confirm('确认永久删除？')) return;
      const { error } = await supabase.from('bookings').delete().eq('id', id);
      if (error) alert('删除失败：' + error.message);
      else fetchAdminBookings();
    };

    // 注册用户（RLS 策略允许管理员插入）
    document.getElementById('registerUserBtn').addEventListener('click', async () => {
      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      if (!name || !phone) return alert('姓名和手机号必填');
      const team = document.getElementById('regTeam').value.trim();
      const hobby = document.getElementById('regHobby').value.trim();
      const { error } = await supabase.from('profiles').insert({ name, phone, team, hobby });
      if (error) {
        alert('注册失败：' + error.message);
      } else {
        alert('注册成功！');
        document.getElementById('regName').value = '';
        document.getElementById('regPhone').value = '';
        document.getElementById('regTeam').value = '';
        document.getElementById('regHobby').value = '';
      }
    });

    // 导出CSV
    document.getElementById('exportCsv').addEventListener('click', async () => {
      const start = document.getElementById('adminStartDate').value;
      const end = document.getElementById('adminEndDate').value;
      const roomId = document.getElementById('adminRoomFilter').value;

      let query = supabase.from('bookings').select('user_id, rooms(name), booking_date, time_slot, participants, status, teacher_choice');
      if (start) query = query.gte('booking_date', start);
      if (end) query = query.lte('booking_date', end);
      if (roomId) query = query.eq('room_id', roomId);

      const { data } = await query;
      if (!data || data.length === 0) return alert('无数据可导出');

      const csv = ['手机号,教室,课程,老师,日期,时段,人数,状态'].concat(data.map(r => {
        const [course, teacher] = (r.teacher_choice || '|').split('|');
        return `${r.user_id},${r.rooms.name},${course || ''},${teacher || ''},${r.booking_date},${r.time_slot},${r.participants},${r.status}`;
      })).join('\n');

      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `预约记录_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    });
  </script>
</body>
</html>
