<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>文化馆场馆预约</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #f5f0e8;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><rect x="2" y="2" width="36" height="36" fill="none" stroke="%23c9b896" stroke-width="1" opacity="0.35"/><rect x="8" y="8" width="24" height="24" fill="none" stroke="%23c9b896" stroke-width="1" opacity="0.35"/><rect x="14" y="14" width="12" height="12" fill="none" stroke="%23c9b896" stroke-width="1" opacity="0.35"/><line x1="20" y1="2" x2="20" y2="8" stroke="%23c9b896" stroke-width="1" opacity="0.35"/><line x1="20" y1="32" x2="20" y2="38" stroke="%23c9b896" stroke-width="1" opacity="0.35"/><line x1="2" y1="20" x2="8" y2="20" stroke="%23c9b896" stroke-width="1" opacity="0.35"/><line x1="32" y1="20" x2="38" y2="20" stroke="%23c9b896" stroke-width="1" opacity="0.35"/></svg>');
      background-size: 40px 40px;
      font-family: "Microsoft YaHei", "苹方", sans-serif;
    }
    .card { background-color: rgba(255, 252, 245, 0.92); backdrop-filter: blur(10px); border: 1px solid #d4c5a9; border-radius: 1.2rem; }
    .btn-primary { background-color: #8b4513; color: white; border-radius: 0.8rem; font-weight: bold; text-align: center; }
    .btn-primary:hover { background-color: #a0522d; }
    h1, h2 { color: #5c3d2e; font-family: "KaiTi", "楷体", "STKaiti", serif; }
    .highlight-card { border: 2px solid #8b4513; background-color: rgba(139,69,19,0.08); }
    .selection-card { display: flex; align-items: center; justify-content: center; text-align: center; }
  </style>
</head>
<body class="min-h-screen">

  <!-- 登录界面 -->
  <div id="loginPage" class="max-w-md mx-auto p-6 pt-20">
    <div class="card shadow-lg p-8">
      <h1 class="text-3xl font-bold text-center mb-2">文化馆预约</h1>
      <p class="text-gray-500 text-center mb-8">免费使用场馆和教室</p>
      <div>
        <label class="block text-lg mb-2">手机号码</label>
        <input type="tel" id="phoneInput" class="w-full text-lg p-4 border border-gray-300 rounded-xl mb-4" placeholder="输入手机号">
        <button id="loginBtn" class="w-full btn-primary text-xl py-4 rounded-xl">登录</button>
      </div>
      <p class="text-gray-400 text-sm text-center mt-4">仅限已注册用户，请联系管理员注册</p>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="mainPage" class="max-w-2xl mx-auto p-4 hidden">
    <div class="flex justify-between items-center mb-6">
      <div class="text-lg">👤 <span id="userDisplay" class="font-bold"></span></div>
      <button id="logoutBtn" class="text-red-500 underline">退出</button>
    </div>

    <!-- 1. 选择教室（假期班自动隐藏） -->
    <div id="roomSection" class="card shadow p-6 mb-4">
      <h2 class="text-2xl font-bold mb-4">1️⃣ 选择教室</h2>
      <div id="roomList" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- 2. 选择课程 -->
    <div class="card shadow p-6 mb-4">
      <h2 class="text-2xl font-bold mb-4">2️⃣ 选择课程</h2>
      <div id="courseList" class="grid grid-cols-2 gap-4"></div>
      <div id="customCourseInput" class="hidden mt-4">
        <input type="text" id="customCourseName" class="w-full text-lg p-4 border border-gray-300 rounded-xl" placeholder="请输入课程名称">
      </div>
    </div>

    <!-- 3. 老师姓名 -->
    <div class="card shadow p-6 mb-4">
      <h2 class="text-2xl font-bold mb-4">3️⃣ 老师姓名</h2>
      <input type="text" id="teacherNameInput" class="w-full text-lg p-4 border border-gray-300 rounded-xl" placeholder="填写老师姓名">
    </div>

    <!-- 4. 参加人数 -->
    <div class="card shadow p-6 mb-4">
      <h2 class="text-2xl font-bold mb-4">4️⃣ 参加人数 <span class="text-red-500">*</span></h2>
      <input type="number" id="participantsInput" class="w-full text-xl p-4 border border-gray-300 rounded-xl" min="1" value="1">
    </div>

    <!-- 日期选择 -->
    <div id="dateSingleSection" class="card shadow p-6 mb-4">
      <h2 class="text-2xl font-bold mb-4">5️⃣ 选择日期</h2>
      <input type="date" id="datePicker" class="w-full text-xl p-4 border border-gray-300 rounded-xl">
    </div>

    <div id="dateRangeSection" class="card shadow p-6 mb-4 hidden">
      <h2 class="text-2xl font-bold mb-4">5️⃣ 选择培训日期范围</h2>
      <div class="flex gap-4 items-center">
        <input type="date" id="startDate" class="flex-1 text-xl p-4 border border-gray-300 rounded-xl">
        <span class="text-xl">至</span>
        <input type="date" id="endDate" class="flex-1 text-xl p-4 border border-gray-300 rounded-xl">
      </div>
      <p class="text-sm text-gray-500 mt-2">包含起止日期，每天全天使用</p>
    </div>

    <!-- 6. 选择时段（假期班隐藏） -->
    <div id="timeSection" class="card shadow p-6 mb-4">
      <h2 class="text-2xl font-bold mb-4">6️⃣ 选择时段</h2>
      <div id="timeSlots" class="grid grid-cols-2 gap-3"></div>
    </div>

    <button id="submitBooking" class="w-full btn-primary text-2xl py-6 rounded-2xl transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>立即预约</button>

    <!-- 我的预约 -->
    <div class="mt-8">
      <h2 class="text-2xl font-bold mb-4">📋 我的预约（有效）</h2>
      <div id="activeBookings" class="card shadow p-4"></div>
      <div class="mt-4 text-center">
        <button id="toggleHistoryBtn" class="text-lg text-blue-600 underline hover:text-blue-800">📜 查看历史预约 ▼</button>
      </div>
      <div id="historyBookings" class="card shadow p-4 mt-2 hidden"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://aermnnksvhezfykxefla.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_l9yA9MKkAqT_4gIrgoCriA_kCDlLrIR';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let selectedRoom = null;
    let selectedCourse = null;
    let selectedTeacher = null;
    let selectedDate = null;
    let selectedStartDate = null;
    let selectedEndDate = null;
    let selectedTimeSlot = null;
    let isHolidayMode = false;

    const FIXED_COURSES = [
      '舞蹈排练', '少儿书法', '声乐合唱', '器乐民乐',
      '曲艺快板', '书法绘画', '民俗', '非遗',
      '假期培训班', '自选课程'
    ];

    const HOLIDAY_ROOM_NAME = '假期培训专用教室';
    let holidayRoomId = null;

    // ==================== 登录 ====================
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.addEventListener('click', async () => {
      const phone = document.getElementById('phoneInput').value.trim();
      if (!/^1[0-9]{10}$/.test(phone)) return alert('请输入正确的手机号');
      const { data } = await supabase.from('profiles').select('phone, name').eq('phone', phone).maybeSingle();
      if (!data) return alert('该手机号未注册，请联系管理员');
      currentUser = data.phone;
      localStorage.setItem('currentUser', JSON.stringify(data));
      showMain(data);
    });

    function showMain(profile) {
      if (!profile || !profile.phone || !profile.name) {
        localStorage.removeItem('currentUser'); currentUser = null;
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('loginPage').classList.remove('hidden');
        return;
      }
      currentUser = profile.phone;
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainPage').classList.remove('hidden');
      document.getElementById('userDisplay').textContent = `${profile.name}（尾号${profile.phone.slice(-4)}）`;
      loadRooms();
      loadFixedCourses();
      loadMyBookings();
    }

    const saved = localStorage.getItem('currentUser');
    if (saved) {
      try {
        const profile = JSON.parse(saved);
        if (profile && profile.phone && profile.name) showMain(profile);
        else { localStorage.removeItem('currentUser'); document.getElementById('loginPage').classList.remove('hidden'); }
      } catch (e) { localStorage.removeItem('currentUser'); document.getElementById('loginPage').classList.remove('hidden'); }
    } else {
      document.getElementById('loginPage').classList.remove('hidden');
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('currentUser'); currentUser = null; location.reload();
    });

    // ==================== 加载教室 ====================
    async function loadRooms() {
      const { data } = await supabase.from('rooms').select('*');
      const rooms = data || [];
      const holidayRoom = rooms.find(r => r.name === HOLIDAY_ROOM_NAME);
      holidayRoomId = holidayRoom ? holidayRoom.id : null;
      const container = document.getElementById('roomList');
      container.innerHTML = '';
      rooms.filter(r => r.name !== HOLIDAY_ROOM_NAME).forEach(room => {
        const card = document.createElement('div');
        card.className = 'p-4 border-2 rounded-xl cursor-pointer text-lg font-medium card selection-card';
        card.textContent = room.name;
        card.dataset.roomId = room.id;
        card.addEventListener('click', () => selectRoom(card, room));
        container.appendChild(card);
      });
    }

    function selectRoom(element, room) {
      document.querySelectorAll('#roomList div').forEach(el => el.classList.remove('highlight-card'));
      element.classList.add('highlight-card');
      selectedRoom = room;
      checkSubmitReady();
    }

    // ==================== 加载课程 ====================
    function loadFixedCourses() {
      const container = document.getElementById('courseList');
      container.innerHTML = '';
      FIXED_COURSES.forEach(courseName => {
        const card = document.createElement('div');
        card.className = 'p-4 border-2 rounded-xl cursor-pointer text-lg font-medium card selection-card';
        card.textContent = courseName;
        card.addEventListener('click', () => selectCourse(card, courseName));
        container.appendChild(card);
      });
    }

    const customInputDiv = document.getElementById('customCourseInput');
    const customCourseInput = document.getElementById('customCourseName');
    const roomSection = document.getElementById('roomSection');
    const dateSingle = document.getElementById('dateSingleSection');
    const dateRange = document.getElementById('dateRangeSection');
    const timeSection = document.getElementById('timeSection');

    function selectCourse(element, courseName) {
      document.querySelectorAll('#courseList div').forEach(el => el.classList.remove('highlight-card'));
      element.classList.add('highlight-card');
      selectedCourse = courseName;
      isHolidayMode = (courseName === '假期培训班');

      if (isHolidayMode) {
        roomSection.classList.add('hidden');
        dateSingle.classList.add('hidden');
        dateRange.classList.remove('hidden');
        timeSection.classList.add('hidden');      // 隐藏时段选择
        selectedRoom = null;
        selectedTimeSlot = '全天';                // 自动设为全天
      } else {
        roomSection.classList.remove('hidden');
        dateRange.classList.add('hidden');
        dateSingle.classList.remove('hidden');
        timeSection.classList.remove('hidden');   // 显示时段选择
        selectedStartDate = selectedEndDate = null;
        selectedTimeSlot = null;                  // 清空时段选择
      }

      if (courseName === '自选课程') {
        customInputDiv.classList.remove('hidden');
        selectedCourse = customCourseInput.value.trim() || null;
      } else {
        customInputDiv.classList.add('hidden');
        customCourseInput.value = '';
      }

      checkSubmitReady();
    }

    customCourseInput.addEventListener('input', () => {
      if (document.querySelector('#courseList div.highlight-card')?.textContent === '自选课程') {
        selectedCourse = customCourseInput.value.trim();
        checkSubmitReady();
      }
    });

    // ==================== 老师姓名 ====================
    const teacherInput = document.getElementById('teacherNameInput');
    teacherInput.addEventListener('input', () => {
      selectedTeacher = teacherInput.value.trim();
      checkSubmitReady();
    });

    // ==================== 人数 ====================
    document.getElementById('participantsInput').addEventListener('input', checkSubmitReady);

    // ==================== 日期处理 ====================
    document.getElementById('datePicker').addEventListener('change', function(e) {
      selectedDate = e.target.value;
      if (!isHolidayMode && selectedRoom) loadTimeSlots();
      checkSubmitReady();
    });

    document.getElementById('startDate').addEventListener('change', function(e) {
      selectedStartDate = e.target.value;
      if (isHolidayMode && selectedStartDate && selectedEndDate) loadTimeSlots();
      checkSubmitReady();
    });
    document.getElementById('endDate').addEventListener('change', function(e) {
      selectedEndDate = e.target.value;
      if (isHolidayMode && selectedStartDate && selectedEndDate) loadTimeSlots();
      checkSubmitReady();
    });

    // ==================== 时段（仅普通预约） ====================
    async function loadTimeSlots() {
      const slots = ['08:00-10:00','10:00-12:00','14:00-16:00','16:00-18:00','18:00-20:00'];
      const container = document.getElementById('timeSlots');
      container.innerHTML = '';

      if (isHolidayMode) return; // 假期班不需要时段按钮

      if (!selectedRoom || !selectedDate) return;

      const { data: occupied } = await supabase
        .from('bookings')
        .select('time_slot')
        .eq('room_id', selectedRoom.id)
        .eq('booking_date', selectedDate)
        .eq('status', 'confirmed');

      const occupiedSlots = occupied ? occupied.map(b => b.time_slot) : [];
      slots.forEach(slot => {
        const btn = document.createElement('button');
        const isFull = occupiedSlots.includes(slot);
        btn.className = 'p-4 rounded-xl text-lg font-bold ' + (isFull ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white border-2 border-gray-300 hover:border-blue-500');
        btn.textContent = slot + (isFull ? ' (已约满)' : '');
        btn.disabled = isFull;
        if (!isFull) {
          btn.addEventListener('click', () => {
            document.querySelectorAll('#timeSlots button').forEach(b => b.classList.remove('border-blue-600','bg-blue-50'));
            btn.classList.add('border-blue-600','bg-blue-50');
            selectedTimeSlot = slot;
            checkSubmitReady();
          });
        }
        container.appendChild(btn);
      });
    }

    function checkSubmitReady() {
      let validCourse = selectedCourse;
      if (selectedCourse === '自选课程') validCourse = customCourseInput.value.trim();
      const participants = parseInt(document.getElementById('participantsInput').value);
      const teacherVal = teacherInput.value.trim();
      selectedTeacher = teacherVal;

      let dateReady = false;
      if (isHolidayMode) {
        dateReady = !!(selectedStartDate && selectedEndDate && selectedStartDate <= selectedEndDate);
        // 假期班时段固定为“全天”，无需检查 selectedTimeSlot
      } else {
        dateReady = !!selectedDate && !!selectedTimeSlot;
      }

      document.getElementById('submitBooking').disabled = !(
        validCourse && teacherVal && participants > 0 && dateReady &&
        (isHolidayMode || selectedRoom) // 普通预约必须选教室
      );
    }

    // ==================== 提交预约 ====================
    document.getElementById('submitBooking').addEventListener('click', async () => {
      let finalCourse = selectedCourse;
      if (selectedCourse === '自选课程') finalCourse = customCourseInput.value.trim();
      if (!finalCourse) return alert('请选择或填写课程名称');

      const teacherVal = teacherInput.value.trim();
      if (!teacherVal) return alert('请填写老师姓名');
      const participants = parseInt(document.getElementById('participantsInput').value);
      if (!participants || participants < 1) return alert('请填写参加人数');

      if (isHolidayMode) {
        // 假期培训班逻辑
        if (!holidayRoomId) return alert('系统错误：未找到假期专用教室，请联系管理员');
        if (!selectedStartDate || !selectedEndDate) return alert('请选择日期范围');
        if (selectedStartDate > selectedEndDate) return alert('开始日期不能晚于结束日期');

        const today = new Date().toISOString().slice(0, 10);
        const { data: existingHoliday } = await supabase
          .from('bookings')
          .select('id')
          .eq('user_id', currentUser)
          .eq('booking_type', 'holiday')
          .eq('status', 'confirmed')
          .gte('booking_date', today)
          .maybeSingle();
        if (existingHoliday) return alert('您已有一个有效的假期培训班预约，不能重复预约');

        const dates = [];
        let current = new Date(selectedStartDate + 'T00:00:00');
        const end = new Date(selectedEndDate + 'T00:00:00');
        while (current <= end) {
          dates.push(current.toISOString().slice(0, 10));
          current.setDate(current.getDate() + 1);
        }

        // 检查冲突（全天专用教室）
        for (const d of dates) {
          const { data: conflict } = await supabase
            .from('bookings')
            .select('id')
            .eq('room_id', holidayRoomId)
            .eq('booking_date', d)
            .eq('time_slot', '全天')
            .eq('status', 'confirmed')
            .maybeSingle();
          if (conflict) return alert(`日期 ${d} 已被其他假期培训班占用，请调整日期`);
        }

        const rows = dates.map(d => ({
          user_id: currentUser,
          room_id: holidayRoomId,
          teacher_choice: `${finalCourse}|${teacherVal}`,
          booking_date: d,
          time_slot: '全天',                // 固定为全天
          participants: participants,
          status: 'confirmed',
          booking_type: 'holiday'
        }));

        const { error } = await supabase.from('bookings').insert(rows);
        if (error) {
          alert('预约失败：' + error.message);
        } else {
          alert(`假期培训班预约成功！共 ${dates.length} 天`);
          selectedStartDate = selectedEndDate = null;
          selectedTimeSlot = null;
          loadMyBookings();
          document.getElementById('submitBooking').disabled = true;
        }
      } else {
        // 普通预约逻辑
        if (!selectedRoom) return alert('请选择教室');
        if (!selectedDate) return alert('请选择日期');

        const today = new Date().toISOString().slice(0, 10);
        const { data: todayBookings } = await supabase
          .from('bookings')
          .select('id')
          .eq('user_id', currentUser)
          .eq('status', 'confirmed')
          .eq('booking_type', 'normal')
          .gte('booking_date', today)
          .lte('booking_date', today);

        if (todayBookings && todayBookings.length >= 2) {
          return alert('您今天已有两次普通预约，无法继续预约。');
        }

        const { error } = await supabase.from('bookings').insert({
          user_id: currentUser,
          room_id: selectedRoom.id,
          teacher_choice: `${finalCourse}|${teacherVal}`,
          booking_date: selectedDate,
          time_slot: selectedTimeSlot,
          participants: participants,
          status: 'confirmed',
          booking_type: 'normal'
        });

        if (error) {
          alert('预约失败：' + error.message);
        } else {
          alert('预约成功！');
          selectedDate = null;
          selectedTimeSlot = null;
          loadTimeSlots();
          loadMyBookings();
          document.getElementById('submitBooking').disabled = true;
        }
      }
    });

    // ==================== 我的预约 ====================
    async function loadMyBookings() {
      const { data } = await supabase
        .from('bookings')
        .select('id, rooms(name), booking_date, time_slot, participants, status, teacher_choice, booking_type')
        .eq('user_id', currentUser)
        .order('booking_date', { ascending: false });

      const today = new Date().toISOString().slice(0, 10);
      const normalBookings = (data || []).filter(b => b.booking_type !== 'holiday');
      const holidayBookings = (data || []).filter(b => b.booking_type === 'holiday');

      const activeNormal = normalBookings.filter(b => b.status === 'confirmed' && b.booking_date >= today);
      const historyNormal = normalBookings.filter(b => !(b.status === 'confirmed' && b.booking_date >= today));

      const holidayGroups = groupHolidayBookings(holidayBookings);
      const activeHoliday = holidayGroups.filter(g => g.status === 'confirmed' && g.maxDate >= today);
      const historyHoliday = holidayGroups.filter(g => !(g.status === 'confirmed' && g.maxDate >= today));

      const activeContainer = document.getElementById('activeBookings');
      let activeHTML = '';
      if (activeNormal.length === 0 && activeHoliday.length === 0) {
        activeHTML = '<p class="text-gray-500 p-4">暂无有效预约</p>';
      } else {
        activeHTML += activeNormal.map(b => renderNormalRow(b, true)).join('');
        activeHTML += activeHoliday.map(g => renderHolidayRow(g, true)).join('');
      }
      activeContainer.innerHTML = activeHTML;

      const historyContainer = document.getElementById('historyBookings');
      let historyHTML = '';
      if (historyNormal.length === 0 && historyHoliday.length === 0) {
        historyHTML = '<p class="text-gray-500 p-4">暂无历史预约</p>';
      } else {
        historyHTML += historyNormal.map(b => renderNormalRow(b, false)).join('');
        historyHTML += historyHoliday.map(g => renderHolidayRow(g, false)).join('');
      }
      historyContainer.innerHTML = historyHTML;

      const toggleBtn = document.getElementById('toggleHistoryBtn');
      toggleBtn.onclick = () => {
        historyContainer.classList.toggle('hidden');
        toggleBtn.textContent = historyContainer.classList.contains('hidden') ? '📜 查看历史预约 ▼' : '📜 隐藏历史预约 ▲';
      };
    }

    function renderNormalRow(b, isActive) {
      const [course, teacher] = (b.teacher_choice || '|').split('|');
      return `
        <div class="flex justify-between items-center border-b p-3 ${isActive ? '' : 'opacity-70'}">
          <div>
            <div class="font-bold text-lg">${b.rooms?.name || '未知教室'} · ${course || '未知课程'}</div>
            <div class="text-gray-600">${b.booking_date} ${b.time_slot} · ${b.participants}人 · 老师：${teacher || '无'}</div>
          </div>
          <div>${isActive ? '<span class="text-green-600 font-bold">已预约</span>' : `<span class="text-gray-400">${b.status === 'cancelled' ? '已取消' : '已过期'}</span>`}</div>
        </div>
      `;
    }

    function renderHolidayRow(g, isActive) {
      const [course, teacher] = (g.teacher_choice || '|').split('|');
      const dateRange = g.minDate === g.maxDate ? g.minDate : `${g.minDate} ~ ${g.maxDate}`;
      return `
        <div class="flex justify-between items-center border-b p-3 ${isActive ? 'bg-yellow-50' : 'opacity-70'}">
          <div>
            <div class="font-bold text-lg">🎓 假期培训班 · ${course || '未知课程'}</div>
            <div class="text-gray-600">${dateRange} 全天 · ${g.participants}人 · 老师：${teacher || '无'}</div>
            <div class="text-sm text-gray-500">共 ${g.days} 天</div>
          </div>
          <div>${isActive ? '<span class="text-green-600 font-bold">进行中</span>' : `<span class="text-gray-400">${g.status === 'cancelled' ? '已取消' : '已结束'}</span>`}</div>
        </div>
      `;
    }

    function groupHolidayBookings(bookings) {
      const groups = {};
      bookings.forEach(b => {
        const key = `${b.user_id}|${b.teacher_choice}|${b.time_slot}|${b.status}`;
        if (!groups[key]) {
          groups[key] = { ...b, dates: [] };
        }
        groups[key].dates.push(b.booking_date);
      });
      return Object.values(groups).map(g => {
        const sortedDates = g.dates.sort();
        return {
          ...g,
          minDate: sortedDates[0],
          maxDate: sortedDates[sortedDates.length - 1],
          days: sortedDates.length
        };
      });
    }
  </script>
</body>
